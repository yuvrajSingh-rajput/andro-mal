version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: andromal_backend
    ports:
      - "8000:8000"
    environment:
      - DOCKER_MODE=true
    volumes:
      - ./tmp:/app/tmp
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: andromal_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
